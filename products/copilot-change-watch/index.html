<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Copilot Change Watch</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:860px;margin:32px auto;padding:0 16px;line-height:1.5}
    textarea{width:100%;height:180px;padding:12px}
    button,a.cta{display:inline-block;margin-top:12px;padding:10px 14px;border-radius:8px;border:0;background:#111;color:#fff;text-decoration:none;cursor:pointer}
    .secondary{background:#1d9bf0}
    pre{background:#f6f6f6;padding:12px;white-space:pre-wrap;border-radius:8px}
    .card{background:#fafafa;border:1px solid #eee;border-radius:12px;padding:16px;margin-top:20px}
  </style>
</head>
<body>
  <h1>Copilot Change Watch</h1>
  <p>Track sudden GitHub / Copilot feature changes across dates, plans, and screenshots. Turn messy notes into a shareable change brief in seconds.</p>

  <label for="notes"><strong>Paste your observations</strong></label>
  <textarea id="notes" placeholder="Example:
2026-03-10 / Pro / Claude Sonnet missing in chat panel
2026-03-12 / Pro / Claude Sonnet restored
2026-03-14 / Team / New model selector visible"></textarea>
  <br>
  <button onclick="run()">Generate Brief</button>

  <div class="card">
    <h2>Result</h2>
    <pre id="output">Your change brief will appear here.</pre>
    <a class="cta" href="https://buymeacoffee.com/kgninja" target="_blank" rel="noreferrer">Support KG on BuyMeACoffee</a>
    <button class="secondary" onclick="tweet()">Tweet this result</button>
  </div>

  <script>
    function run(){
      const raw=document.getElementById('notes').value.trim();
      const out=document.getElementById('output');
      if(!raw){ out.textContent='Paste at least one observed feature change.'; return; }
      const lines=raw.split(/\n+/).filter(Boolean);
      const summary=[];
      summary.push('Copilot Change Brief');
      summary.push(`Entries: ${lines.length}`);
      summary.push('');
      lines.forEach((line,i)=>summary.push(`${i+1}. ${line}`));
      summary.push('');
      summary.push('Why it matters: sudden feature shifts create team confusion, support load, and planning risk.');
      summary.push('Next step: capture screenshots, plan tier, and exact UI surface for each change.');
      out.textContent=summary.join('\n');
    }
    function tweet(){
      const text=document.getElementById('output').textContent.trim();
      const body=text && text !== 'Your change brief will appear here.'
        ? `I used Copilot Change Watch to turn feature-change notes into a quick brief.\n\n${text.slice(0,1800)}\n\nhttps://github.com/KG-NINJA/OpenclawTajikarao`
        : 'I am testing Copilot Change Watch, a tiny tool for tracking sudden GitHub/Copilot feature changes. https://github.com/KG-NINJA/OpenclawTajikarao';
      window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(body),'_blank');
    }
  </script>
</body>
</html>
