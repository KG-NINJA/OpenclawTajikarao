<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Query Incident Brief</title><style>body{font-family:Arial,sans-serif;max-width:900px;margin:32px auto;padding:0 16px;line-height:1.5}textarea{width:100%;height:220px;padding:12px}button,a.cta{display:inline-block;margin-top:12px;padding:10px 14px;border-radius:8px;border:0;background:#111;color:#fff;text-decoration:none;cursor:pointer}.secondary{background:#1d9bf0}pre{background:#f6f6f6;padding:12px;white-space:pre-wrap;border-radius:8px}.card{background:#fafafa;border:1px solid #eee;border-radius:12px;padding:16px;margin-top:20px}</style></head><body><h1>Query Incident Brief</h1><p>Paste raw DB incident notes and get a concise customer-facing and internal summary.</p><textarea id="notes" placeholder="2026-03-27 00:11 slow query on checkout
CPU spike on db-primary
Top query: SELECT ... FROM orders ..."></textarea><br><button onclick="run()">Generate brief</button><div class="card"><h2>Result</h2><pre id="output">Your brief will appear here.</pre><a class="cta" href="https://buymeacoffee.com/kgninja" target="_blank" rel="noreferrer">Support KG on BuyMeACoffee</a><button class="secondary" onclick="tweet()">Tweet this result</button></div><script>function run(){const raw=document.getElementById('notes').value.trim();const out=document.getElementById('output');if(!raw){out.textContent='Paste at least one line.';return;}const summary=['Query Incident Brief'];const lines=raw.split(/\n+/).filter(Boolean); summary.push('Incident entries: '+lines.length);summary.push('');raw.split(/\n+/).filter(Boolean).slice(0,8).forEach((line,i)=>summary.push((i+1)+'. '+line));summary.push('');summary.push('Next step: confirm impact, exact trigger, and immediate mitigation.');out.textContent=summary.join('\n');} function tweet(){const text=document.getElementById('output').textContent.trim();const body=text && text !== 'Your brief will appear here.' ? `I used Query Incident Brief to turn rough notes into a quick brief.\n\n${text.slice(0,1800)}\n\nhttps://github.com/KG-NINJA/OpenclawTajikarao` : 'Testing Query Incident Brief from problemOS signals. https://github.com/KG-NINJA/OpenclawTajikarao'; window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(body),'_blank');}</script></body></html>
