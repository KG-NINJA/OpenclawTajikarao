<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Go Build Pulse</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:900px;margin:32px auto;padding:0 16px;line-height:1.5}
    textarea{width:100%;height:220px;padding:12px}
    button,a.cta{display:inline-block;margin-top:12px;padding:10px 14px;border-radius:8px;border:0;background:#111;color:#fff;text-decoration:none;cursor:pointer}
    .secondary{background:#1d9bf0}
    pre{background:#f6f6f6;padding:12px;white-space:pre-wrap;border-radius:8px}
    .card{background:#fafafa;border:1px solid #eee;border-radius:12px;padding:16px;margin-top:20px}
  </style>
</head>
<body>
  <h1>Go Build Pulse</h1>
  <p>Paste package build timings or rough `go test` / `go build` output and get a compact slowdown brief you can share with your team.</p>

  <label for="logs"><strong>Paste Go build timing lines</strong></label>
  <textarea id="logs" placeholder="Example:
./cmd/api 2.1s
./internal/cache 5.8s
./internal/search 3.9s
./pkg/client 1.3s"></textarea>
  <br>
  <button onclick="run()">Analyze build pulse</button>

  <div class="card">
    <h2>Result</h2>
    <pre id="output">Your build pulse summary will appear here.</pre>
    <a class="cta" href="https://buymeacoffee.com/kgninja" target="_blank" rel="noreferrer">Support KG on BuyMeACoffee</a>
    <button class="secondary" onclick="tweet()">Tweet this result</button>
  </div>

  <script>
    function parseSeconds(line){
      const m=line.match(/(.+?)\s+([0-9]+(?:\.[0-9]+)?)s$/);
      if(!m) return null;
      return {name:m[1].trim(), secs:parseFloat(m[2])};
    }
    function run(){
      const raw=document.getElementById('logs').value.trim();
      const out=document.getElementById('output');
      if(!raw){ out.textContent='Paste at least one package timing line.'; return; }
      const rows=raw.split(/\n+/).map(parseSeconds).filter(Boolean);
      if(!rows.length){ out.textContent='Could not parse timings. Use lines like ./pkg/foo 3.2s'; return; }
      rows.sort((a,b)=>b.secs-a.secs);
      const total=rows.reduce((a,b)=>a+b.secs,0);
      const top=rows.slice(0,3);
      const summary=[];
      summary.push('Go Build Pulse');
      summary.push(`Packages parsed: ${rows.length}`);
      summary.push(`Total observed build time: ${total.toFixed(1)}s`);
      summary.push('');
      summary.push('Top slow packages:');
      top.forEach((r,i)=>summary.push(`${i+1}. ${r.name} — ${r.secs.toFixed(1)}s`));
      summary.push('');
      summary.push('Suggested next step: inspect dependencies, generated code, and unnecessary test/build scope in the top packages first.');
      out.textContent=summary.join('\n');
    }
    function tweet(){
      const text=document.getElementById('output').textContent.trim();
      const body=text && text !== 'Your build pulse summary will appear here.'
        ? `I used Go Build Pulse to turn raw build timings into a quick slowdown brief.\n\n${text.slice(0,1800)}\n\nhttps://github.com/KG-NINJA/OpenclawTajikarao`
        : 'I am testing Go Build Pulse, a tiny tool for summarizing Go build slowdowns. https://github.com/KG-NINJA/OpenclawTajikarao';
      window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(body),'_blank');
    }
  </script>
</body>
</html>
