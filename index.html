<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="SNS向け4コマ漫画JSONと生成プロンプトを出力する30秒スコアアタックゲーム">
    <title>4コマJSON NINJA</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./style.css">
  
    <meta property="og:image" content="assets/background.jpg">
    <meta name="twitter:card" content="summary_large_image">
  </head>
  <body>
    <main class="shell">
      <section id="gameRoot" class="game-frame" aria-label="4コマJSON NINJA ゲーム">
        <div class="topbar">
          <div>
            <p class="label">SNS 4コマJSONメーカー</p>
            <h1>4コマJSON NINJA</h1>
          </div>
          <div class="meters" aria-label="ゲームスコア">
            <span>得点 <strong id="scoreDisplay">0</strong></span>
            <span>残り <strong id="timeDisplay">30.0</strong>s</span>
            <span>最高 <strong id="bestDisplay">0</strong></span>
          </div>
        </div>

        <div class="stage-wrap">
          <canvas id="gameCanvas" aria-label="ネオンの3Dスコアアタック"></canvas>
          <div class="start-panel" id="startPanel">
            <p>光る「JSON断片」を集めて、赤いバグを避ける。30秒でSNS投稿用の4コマ漫画JSONとpromptを鍛えろ。</p>
            <button id="startButton" type="button">ゲーム開始</button>
          </div>
          <div id="gameOverPanel" class="game-over" hidden>
            <p class="label">RESULT</p>
            <h2>投稿ネタが完成</h2>
            <p id="resultLine">スコア 0</p>
            <div class="result-actions">
              <button id="retryButton" type="button">もう一度</button>
              <a id="shareButton" href="#" target="_blank" rel="noopener">Xで共有</a>
              <a id="supportLink" href="https://buy.stripe.com/test_eVqdRacod35kdu8e8n2cg01" target="_blank" rel="noopener">完全版を購入して解除</a>
            </div>
          </div>
        </div>

        <div class="play-ui">
          <div class="instructions">
            <strong>操作:</strong> PCは矢印/WASD、スマホは下のパッド。緑と青のキューブを回収、赤い障害物は減点。
          </div>
          <div class="touch-pad" aria-label="タッチ操作">
            <button class="pad" data-dir="up" type="button">▲</button>
            <button class="pad" data-dir="left" type="button">◀</button>
            <button class="pad" data-dir="down" type="button">▼</button>
            <button class="pad" data-dir="right" type="button">▶</button>
          </div>
        </div>

        <section class="maker-output" aria-label="生成されたJSONとprompt">
          <div>
            <h2>4コマ漫画JSON</h2>
            <pre id="jsonOutput"></pre>
          </div>
          <div>
            <h2>生成prompt</h2>
            <pre id="promptOutput"></pre>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
